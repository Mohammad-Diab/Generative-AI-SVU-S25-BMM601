<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>الذكاء الاصطناعي التوليدي — ITE_BMM601</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Changa:wght@400;600;700;800&family=IBM+Plex+Sans+Arabic:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<canvas id="cursor-canvas"></canvas>

<div id="stage">

  <div id="slide-counter">
    <span id="current-num">01</span>
    <div id="progress-line"><div id="progress-fill"></div></div>
    <span id="total-num">01</span>
  </div>

  <div id="deck">
    <!-- slides will be added here -->
  </div>

  <nav id="slide-nav">
    <button id="btn-prev" disabled>&#8594; السابق</button>
    <div id="dot-track"></div>
    <button id="btn-next" disabled>التالي &#8592;</button>
  </nav>

</div>

<div id="scroll-bar-wrap">
  <div id="scroll-bar-fill"></div>
</div>

<script src="js/main.js"></script>
</body>
</html>
